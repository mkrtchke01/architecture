<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0C0E" />

    <!-- ===== SEO ===== -->
    <!-- TODO: заменить название бренда, домен и описание на реальные -->
    <title>LUMÉRA — архитектурный декор, свет и светопрозрачные конструкции под ключ</title>
    <meta
      name="description"
      content="Проектируем, производим и монтируем индивидуальные архитектурные, интерьерные и ландшафтные декоративные решения с интегрированным освещением, а также стеклянные козырьки, перегородки и зенитные фонари. Работа под архитектуру объекта — от идеи до сдачи."
    />
    <link rel="canonical" href="https://example.com/" />
    <meta name="robots" content="index, follow" />

    <!-- ===== Open Graph / соцсети ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="LUMÉRA" />
    <meta property="og:title" content="LUMÉRA — архитектурный декор, свет и стекло под ключ" />
    <meta
      property="og:description"
      content="Индивидуальные архитектурные решения с интегрированным освещением и светопрозрачными конструкциями: от идеи и проектирования до производства и монтажа."
    />
    <!-- TODO: заменить на реальные URL домена и превью-изображения -->
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/og-cover.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- ===== Шрифты ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ===== Микроразметка: LocalBusiness ===== -->
    <!-- TODO: заменить все поля (name, телефон, адрес, соцсети, координаты) на реальные данные компании -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "LUMÉRA",
        "description": "Архитектурный, интерьерный и ландшафтный декор с интегрированным освещением и светопрозрачные конструкции под ключ.",
        "image": "https://example.com/og-cover.jpg",
        "url": "https://example.com/",
        "telephone": "+7 (000) 000-00-00",
        "email": "hello@example.com",
        "priceRange": "$$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "ул. Примерная, 1",
          "addressLocality": "Москва",
          "addressCountry": "RU"
        },
        "areaServed": "RU",
        "sameAs": [
          "https://t.me/your_channel",
          "https://wa.me/70000000000",
          "https://instagram.com/your_profile"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
